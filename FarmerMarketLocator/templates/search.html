{% extends 'base.html' %}

{% block title %}
Search Results
{% endblock %}

{% block main %}
<div id="searchResultContainer">
<ul>
{% for market in market_list %}
{% set name = market.marketname[4:] %}
<li class="market_link"><a href="{{url_for('markets.show_market',market_id=market.id)}}">{{name}}</a></li>
<br>
{% endfor %}
</ul>
</div>
{% endblock %}
